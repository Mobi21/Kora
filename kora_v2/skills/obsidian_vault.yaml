name: obsidian_vault
display_name: "Obsidian Vault"

tools: []

discovery_tools: []

guidance: |
  ## Obsidian Vault

  Obsidian vault integration is now handled by the ``vault_capability`` skill
  and the ``vault.*`` capability pack actions (``vault.write_note``,
  ``vault.write_clip``, ``vault.read_note``).

  If the user has configured KORA_VAULT__PATH to point at their Obsidian
  folder, notes written via ``vault.write_note`` appear directly in Obsidian.

  Use ``recall`` to search across Kora's memory layers for stored knowledge
  and facts from past sessions.

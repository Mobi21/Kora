      Baseline CSP. Authoritative CSP is enforced by the main process via
      response headers (electron/main.ts installCsp()). The meta below is a
      defense-in-depth layer for stray network-loaded HTML. Vite's dev plugin
      replaces this with a permissive dev variant via vite.config.ts so HMR
      and inline modules work in development.
    -->
    <meta http-equiv="Content-Security-Policy" content="<!--CSP_PLACEHOLDER-->" />

  </head>
